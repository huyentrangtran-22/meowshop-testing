name: Selenium Automation Test

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  selenium-test:
    runs-on: windows-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run Selenium Testcases
        run: npm test
