name: Selenium Automation Test

on:
  push:
    branches:
      - main

jobs:
  selenium-test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # =====================
      # RESTORE CACHE
      # =====================
      - name: Restore Jira Cache
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: jiraCache
          path: utils/

      # 🔥 đảm bảo file tồn tại
      - name: Ensure cache file exists
        run: |
          if not exist utils\jiraCache.json echo {} > utils\jiraCache.json

      - run: npm install

      # =====================
      # RUN TESTS
      # =====================
      - name: Run tests
        run: npm run test-all
        env:
          JIRA_URL: ${{ secrets.JIRA_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}
        continue-on-error: true

      # =====================
      # SAVE CACHE
      # =====================
      - name: Save Jira Cache
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jiraCache
          path: utils/jiraCache.json

      # =====================
      # LOGS
      # =====================
      - name: Upload Logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: logs
          path: logs/**
